set -g mouse on
set -g focus-events on
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# Without the hyperlinks feature tmux consumes OSC 8 sequences (the right-click
# menu still offers "Copy Hyperlink") but never re-emits them to the outer
# terminal, so Ghostty has nothing to cmd+click on label-style links.
set -as terminal-features 'xterm*:hyperlinks'
set -sg escape-time 10
set -g mode-keys vi
set -g history-limit 10000

set -g default-terminal xterm-ghostty

set -s copy-command pbcopy

bind r source-file ~/.config/tmux/tmux.conf
set -g base-index 1
set -g renumber-windows on

# Step through windows with prefix + p / n (Cmd+Shift+[ / ] in Ghostty map
# to these). No wrap-around: stepping stops at the first/last window.
bind p if -F '#{?window_start_flag,0,1}' previous-window
bind n if -F '#{?window_end_flag,0,1}' next-window

# Two-finger horizontal swipes step through windows via Ghostty's gesture
# engine (see the ghostty config: swipe bindings send prefix + p/n). The
# gesture claim swallows the swipe's scroll copy and momentum tail before it
# reaches the wire, so tmux sees no horizontal wheel events for a recognized
# swipe and needs no wheel-side recognition.

# Wheel: pass through to apps that requested the mouse (or alt screens /
# active modes), otherwise scroll-up enters copy-mode; 5 lines per tick
# inside copy-mode.
bind -n WheelUpPane if -F '#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}' 'send -M' 'copy-mode -e'
bind -n WheelDownPane if -F '#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}' 'send -M'
bind -T copy-mode-vi WheelUpPane {
  select-pane
  send -X -N 5 scroll-up
}
bind -T copy-mode-vi WheelDownPane {
  select-pane
  send -X -N 5 scroll-down
}

# Fuzzy session switcher: fzf over __fzf_alt_c_source candidates, attach or
# create a session named after the picked directory's basename. fzf renders
# its own popup via --tmux from FZF_DEFAULT_OPTS, so no outer display-popup.
bind f run-shell -b "fish -c __tmux_sessionizer"

# Stash current window into a detached "bg" session (background tunnels etc).
# Creates bg on first use. Use `prefix + s` to peek, `prefix + L` to jump back.
bind S if -F '#{==:#{session_name},bg}' \
  'display "already in bg"' \
  'run "tmux has -t bg 2>/dev/null || tmux new-session -d -s bg" ; movew -t bg:'

#resize panes with ctrl + hjkl
bind -n ^k resize-pane -U 5
bind -n ^j resize-pane -D 5
bind -n ^h resize-pane -L 5
bind -n ^l resize-pane -R 5

#jump panes with hjkl
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R


set-option -g set-titles on
set-option -g set-titles-string "#S / #W"

# Status bar - terminal default colors for theme compatibility, except the
# whole bar flips orange while the prefix is pending a follow-up key.
set -g status-style "#{?client_prefix,bg=colour208 fg=colour232,bg=default fg=default}"
set -g status-left-length 14
set -g status-left " #S "
set -g window-status-current-style "bold"
set -g mode-style "bg=colour4,fg=colour15"

# Pager integration (github.com/pszypowicz/pager): clear a page when you return
# to the window that raised it. bell.sh keys each page on #{window_id}, so the
# same id withdraws it. pane-focus-in also fires when Ghostty regains focus on
# the current window (focus-events on), clearing a page on return without a
# window switch; after-select-window covers switching to it from another window.
# run-shell -b never blocks the UI. pager resolves on the tmux server's PATH
# (started from the login shell); if it does not, the remove is a harmless no-op.
set-hook -g pane-focus-in       'run-shell -b "pager remove --key #{window_id}"'
set-hook -g after-select-window 'run-shell -b "pager remove --key #{window_id}"'
