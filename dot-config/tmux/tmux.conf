set -g mouse on
set -g focus-events on
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# Without the hyperlinks feature tmux consumes OSC 8 sequences (the right-click
# menu still offers "Copy Hyperlink") but never re-emits them to the outer
# terminal, so Ghostty has nothing to cmd+click on label-style links.
set -as terminal-features 'xterm*:hyperlinks'
set -sg escape-time 10
set -g mode-keys vi
set -g history-limit 10000

set -g default-terminal xterm-ghostty

set -s copy-command pbcopy

# Claude pages: Claude Code's page hook (claude/hooks/bell.sh) posts
# clickable macOS notifications through Hammerspoon's claudePage, keyed by
# session:window. When the user visits a window or switches sessions,
# withdraw any pending notification for it so pages don't accumulate in
# Notification Center after the user has already seen the relevant context.
# Lua long-brackets [==[...]==] absorb the tmux format expansions verbatim
# so spaces/quotes/etc. in the values don't need shell-level escaping;
# stdout goes to /dev/null because the hs CLI prints a one-time "-- Loading
# extension" line on first call after a Hammerspoon reload that tmux's
# run-shell -b can leak.
set-hook -g after-select-window  'run-shell -b "hs -c \"claudeClearPage([==[#{session_name}]==], [==[#{window_index}]==])\" >/dev/null"'
set-hook -g client-session-changed 'run-shell -b "hs -c \"claudeClearPage([==[#{session_name}]==], [==[#{window_index}]==])\" >/dev/null"'

bind r source-file ~/.config/tmux/tmux.conf
set -g base-index 1
set -g renumber-windows on

# Step through windows with prefix + p / n (Cmd+Shift+[ / ] in Ghostty map
# to these). No wrap-around: stepping stops at the first/last window.
bind p if -F '#{?window_start_flag,0,1}' previous-window
bind n if -F '#{?window_end_flag,0,1}' next-window

# Two-finger horizontal trackpad swipe steps through windows: Ghostty reports
# horizontal scroll as mouse buttons 6 (wheel-left) and 7 (wheel-right) while
# mouse reporting is on, and tmux exposes those as bindable mouse keys. Swipe
# left = next window, swipe right = previous - same direction as
# Cmd+Shift+] / [ above.
#
# Swipe recognition from a raw event stream: Ghostty emits one button event
# per cell of pointer travel plus a momentum tail after the fingers lift, so
# a burst of events must collapse into a single step. Fire after
# @swipe_thresh consecutive events - low enough to feel instant, high enough
# that sideways drift during a vertical scroll doesn't trigger it - then
# hold @swipe_lock for @swipe_cooldown seconds, which swallows the rest of
# the burst and its momentum. The lock gate is format-only, so the per-event
# hot path spawns no processes; only a fired step spawns the unlock timer.
# Counters go stale after a ~2s gap (client_activity has whole-second
# granularity) so stray drift ticks never accumulate into a phantom switch.
#
# The vertical axis gets the mirrored treatment: copy-mode entry on scroll-up
# needs @scroll_thresh consecutive ticks (tmux's default enters on the very
# first one, so a swipe's tiny vertical drift kept flipping panes into scroll
# mode) and is blocked outright while @swipe_lock is held. Each axis also
# resets the other's counters on every event - the dominant axis of a sloppy
# diagonal gesture wins and the minority drift can never fire. The wheel
# bindings otherwise preserve tmux's stock behavior (send -M passthrough to
# apps that requested the mouse, N-line scroll inside copy-mode).
#
# No wrap-around at the edges: a recognized swipe on the first/last window is
# suppressed instead of wrapping, but still engages the lock so the rest of
# the burst stays swallowed rather than re-triggering.
set -g @swipe_thresh 3
set -g @swipe_cooldown 0.3
set -g @swipe_lock ''
set -g @swipe_last 0
set -g @swipe_prev 0
set -g @swipe_next 0
set -g @scroll_thresh 5
set -g @scroll_last 0
set -g @scroll_up 0
bind -n MouseDown6Pane if -F '#{?#{@swipe_lock},0,1}' {
  if -F '#{e|>=:#{e|-:#{client_activity},#{@swipe_last}},2}' 'set -g @swipe_prev 0'
  set -gF @swipe_last '#{client_activity}'
  set -g @swipe_next 0
  set -g @scroll_up 0
  set -gF @swipe_prev '#{e|+:#{@swipe_prev},1}'
  if -F '#{e|>=:#{@swipe_prev},#{@swipe_thresh}}' {
    set -g @swipe_prev 0
    set -g @swipe_lock 1
    if -F '#{?window_start_flag,0,1}' previous-window
    run -b 'sleep #{@swipe_cooldown} ; tmux set -g @swipe_lock ""'
  }
}
bind -n MouseDown7Pane if -F '#{?#{@swipe_lock},0,1}' {
  if -F '#{e|>=:#{e|-:#{client_activity},#{@swipe_last}},2}' 'set -g @swipe_next 0'
  set -gF @swipe_last '#{client_activity}'
  set -g @swipe_prev 0
  set -g @scroll_up 0
  set -gF @swipe_next '#{e|+:#{@swipe_next},1}'
  if -F '#{e|>=:#{@swipe_next},#{@swipe_thresh}}' {
    set -g @swipe_next 0
    set -g @swipe_lock 1
    if -F '#{?window_end_flag,0,1}' next-window
    run -b 'sleep #{@swipe_cooldown} ; tmux set -g @swipe_lock ""'
  }
}
bind -n WheelUpPane if -F '#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}' {
  send -M
  set -g @swipe_prev 0
  set -g @swipe_next 0
} {
  if -F '#{?#{@swipe_lock},0,1}' {
    if -F '#{e|>=:#{e|-:#{client_activity},#{@scroll_last}},2}' 'set -g @scroll_up 0'
    set -gF @scroll_last '#{client_activity}'
    set -g @swipe_prev 0
    set -g @swipe_next 0
    set -gF @scroll_up '#{e|+:#{@scroll_up},1}'
    if -F '#{e|>=:#{@scroll_up},#{@scroll_thresh}}' {
      set -g @scroll_up 0
      copy-mode -e
    }
  }
}
bind -n WheelDownPane if -F '#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}' {
  send -M
  set -g @swipe_prev 0
  set -g @swipe_next 0
} {
  set -g @swipe_prev 0
  set -g @swipe_next 0
}
bind -T copy-mode-vi WheelUpPane {
  select-pane
  send -X -N 5 scroll-up
  set -g @swipe_prev 0
  set -g @swipe_next 0
}
bind -T copy-mode-vi WheelDownPane {
  select-pane
  send -X -N 5 scroll-down
  set -g @swipe_prev 0
  set -g @swipe_next 0
}

# Fuzzy session switcher: fzf over __fzf_alt_c_source candidates, attach or
# create a session named after the picked directory's basename. fzf renders
# its own popup via --tmux from FZF_DEFAULT_OPTS, so no outer display-popup.
bind f run-shell -b "fish -c __tmux_sessionizer"

# Stash current window into a detached "bg" session (background tunnels etc).
# Creates bg on first use. Use `prefix + s` to peek, `prefix + L` to jump back.
bind S if -F '#{==:#{session_name},bg}' \
  'display "already in bg"' \
  'run "tmux has -t bg 2>/dev/null || tmux new-session -d -s bg" ; movew -t bg:'

#resize panes with ctrl + hjkl
bind -n ^k resize-pane -U 5
bind -n ^j resize-pane -D 5
bind -n ^h resize-pane -L 5
bind -n ^l resize-pane -R 5

#jump panes with hjkl
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R


set-option -g set-titles on
set-option -g set-titles-string "#S / #W"

# Status bar - terminal default colors for theme compatibility, except the
# whole bar flips orange while the prefix is pending a follow-up key.
set -g status-style "#{?client_prefix,bg=colour208 fg=colour232,bg=default fg=default}"
set -g status-left-length 14
set -g status-left " #S "
set -g window-status-current-style "bold"
set -g mode-style "bg=colour4,fg=colour15"
