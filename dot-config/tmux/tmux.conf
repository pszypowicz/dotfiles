set -g mouse on
set -g focus-events on
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -sg escape-time 10
set -g mode-keys vi
set -g history-limit 10000

set -g default-terminal xterm-ghostty

set -s copy-command pbcopy

# Bell routing: fire the alert-bell hook directly into Hammerspoon's tmuxBell
# Lua function, which posts a clickable notification whose click runs `tmux
# switch-client` against the session/window that belled. bell-action must be
# `any` rather than `none` - tmux gates the alert-bell hook on bell-action,
# so `none` would skip the hook entirely. Lua long-brackets [==[...]==] absorb
# the tmux format expansions verbatim so spaces/quotes/etc. in the values
# don't need shell-level escaping; stdout goes to /dev/null because the hs
# CLI prints a one-time "-- Loading extension: notify" line on first call
# after a Hammerspoon reload that tmux's run-shell -b can leak.
set -g monitor-bell on
set -g bell-action any
set-hook -g alert-bell 'run-shell -b "hs -c \"tmuxBell([==[#{session_name}]==], [==[#{window_index}]==], [==[#{pane_title}]==])\" >/dev/null"'

# Self-clean: when the user visits a window or switches sessions, withdraw
# any pending Hammerspoon bell notification for that session/window so they
# don't accumulate in Notification Center after the user has already seen
# the relevant context.
set-hook -g after-select-window  'run-shell -b "hs -c \"tmuxClearBell([==[#{session_name}]==], [==[#{window_index}]==])\" >/dev/null"'
set-hook -g client-session-changed 'run-shell -b "hs -c \"tmuxClearBell([==[#{session_name}]==], [==[#{window_index}]==])\" >/dev/null"'

bind r source-file ~/.config/tmux/tmux.conf
set -g base-index 1
set -g renumber-windows on

# Don't wrap around when stepping through windows with prefix + p / n
# (Cmd+Shift+[ / ] in Ghostty map to these). Stop at the first / last window.
bind p if-shell -F '#{e|>:#{window_index},1}' 'previous-window'
bind n if-shell -F '#{e|<:#{window_index},#{session_windows}}' 'next-window'

# Fuzzy session switcher: fzf over __fzf_alt_c_source candidates, attach or
# create a session named after the picked directory's basename. fzf renders
# its own popup via --tmux from FZF_DEFAULT_OPTS, so no outer display-popup.
bind f run-shell -b "fish -c __tmux_sessionizer"

# Stash current window into a detached "bg" session (background tunnels etc).
# Creates bg on first use. Use `prefix + s` to peek, `prefix + L` to jump back.
bind S if -F '#{==:#{session_name},bg}' \
  'display "already in bg"' \
  'run "tmux has -t bg 2>/dev/null || tmux new-session -d -s bg" ; movew -t bg:'

#resize panes with ctrl + hjkl
bind -n ^k resize-pane -U 5
bind -n ^j resize-pane -D 5
bind -n ^h resize-pane -L 5
bind -n ^l resize-pane -R 5

#jump panes with hjkl
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R


set-option -g set-titles on
set-option -g set-titles-string "#S / #W"

# Status bar - terminal default colors for theme compatibility
set -g status-style "bg=default,fg=default"
set -g status-left-length 14
set -g status-left " #S "
set -g window-status-current-style "bold"
set -g mode-style "bg=colour4,fg=colour15"
